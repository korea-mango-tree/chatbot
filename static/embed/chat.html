<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 챗봇</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', 'Malgun Gothic', -apple-system, sans-serif; background: #fafbfc; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* ── Header ── */
        .header { padding: 16px 20px; background: var(--primary, #4a6cf7); color: #fff; display: flex; align-items: center; gap: 12px; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header-icon { width: 36px; height: 36px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; backdrop-filter: blur(4px); }
        .header-info h2 { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
        .header-info p { font-size: 11px; opacity: 0.75; margin-top: 1px; }
        .header-status { margin-left: auto; display: flex; align-items: center; gap: 5px; font-size: 11px; opacity: 0.8; }
        .header-status::before { content: ''; width: 6px; height: 6px; background: #4ade80; border-radius: 50%; }

        /* ── Messages ── */
        .messages { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }

        /* ── Message ── */
        .msg { display: flex; gap: 8px; max-width: 85%; animation: fade-in 0.25s ease-out; }
        .msg.user { align-self: flex-start; }
        .msg.bot { align-self: flex-end; flex-direction: row-reverse; }
        .msg.admin { align-self: flex-end; flex-direction: row-reverse; }

        .msg-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; margin-top: 2px; }
        .msg.user .msg-avatar { background: #e8edf3; }
        .msg.bot .msg-avatar { background: var(--primary, #4a6cf7); color: #fff; }
        .msg.admin .msg-avatar { background: #f59e0b; color: #fff; }

        .msg-content { display: flex; flex-direction: column; }
        .msg.bot .msg-content { align-items: flex-end; }
        .msg.admin .msg-content { align-items: flex-end; }

        .msg-bubble { padding: 10px 14px; border-radius: 16px; font-size: 13px; line-height: 1.6; word-break: break-word; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
        .msg.user .msg-bubble { background: #fff; color: #1a1a2e; border: 1px solid #e8eaed; border-bottom-left-radius: 4px; }
        .msg.bot .msg-bubble { background: var(--primary, #4a6cf7); color: #fff; border-bottom-right-radius: 4px; }
        .msg.admin .msg-bubble { background: linear-gradient(135deg, #f59e0b, #f97316); color: #fff; border-bottom-right-radius: 4px; }

        .msg-bubble p { margin: 0 0 6px; }
        .msg-bubble p:last-child { margin-bottom: 0; }
        .msg-bubble a { color: inherit; text-decoration: underline; }
        .msg-bubble code { background: rgba(0,0,0,0.1); padding: 1px 4px; border-radius: 3px; font-size: 12px; }
        .msg-bubble table { border-collapse: collapse; margin: 8px 0; font-size: 11px; width: 100%; }
        .msg-bubble th, .msg-bubble td { border: 1px solid rgba(255,255,255,0.2); padding: 4px 8px; text-align: left; }
        .msg.user .msg-bubble th, .msg.user .msg-bubble td { border-color: #ddd; }
        .msg.user .msg-bubble th { background: #f7f7f7; }
        .msg.bot .msg-bubble th { background: rgba(255,255,255,0.15); }
        .msg-bubble ul, .msg-bubble ol { padding-left: 18px; margin: 4px 0; }
        .msg-bubble li { margin: 2px 0; }

        .msg-time { font-size: 10px; color: #aaa; margin-top: 4px; padding: 0 4px; }

        .sources-toggle { font-size: 11px; color: var(--primary, #4a6cf7); cursor: pointer; margin-top: 6px; padding: 4px 8px; background: rgba(74,108,247,0.06); border-radius: 6px; display: inline-block; }
        .sources-toggle:hover { background: rgba(74,108,247,0.12); }
        .sources-list { display: none; font-size: 11px; color: #666; margin-top: 4px; padding: 6px 10px; background: #f8f9fa; border-radius: 6px; line-height: 1.6; }
        .sources-list.open { display: block; }

        /* ── Welcome ── */
        .welcome { text-align: center; padding: 48px 24px; color: #999; }
        .welcome-icon { font-size: 40px; margin-bottom: 12px; }
        .welcome h3 { font-size: 16px; color: #333; margin-bottom: 6px; font-weight: 600; }
        .welcome p { font-size: 13px; line-height: 1.5; }

        /* ── Typing ── */
        .typing { display: flex; gap: 5px; padding: 8px 14px; align-items: center; }
        .typing span { width: 7px; height: 7px; background: rgba(255,255,255,0.6); border-radius: 50%; animation: typing 1.2s infinite; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%,100%{opacity:0.3;transform:translateY(0)} 50%{opacity:1;transform:translateY(-4px)} }

        /* ── Input ── */
        .input-area { padding: 12px 16px; border-top: 1px solid #eee; display: flex; gap: 8px; flex-shrink: 0; background: #fff; }
        .input-area textarea { flex: 1; border: 1px solid #e0e3e8; border-radius: 22px; padding: 10px 18px; font-size: 13px; font-family: inherit; resize: none; max-height: 80px; outline: none; transition: border-color 0.2s; background: #f8f9fa; }
        .input-area textarea:focus { border-color: var(--primary, #4a6cf7); background: #fff; box-shadow: 0 0 0 3px rgba(74,108,247,0.08); }
        .input-area button { width: 42px; height: 42px; border-radius: 50%; background: var(--primary, #4a6cf7); color: #fff; border: none; cursor: pointer; font-size: 17px; flex-shrink: 0; transition: transform 0.15s, opacity 0.15s; display: flex; align-items: center; justify-content: center; }
        .input-area button:hover:not(:disabled) { transform: scale(1.05); }
        .input-area button:disabled { opacity: 0.4; cursor: not-allowed; }

        @keyframes fade-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="header" id="header">
        <div class="header-icon">🤖</div>
        <div class="header-info">
            <h2 id="botName">AI 챗봇</h2>
            <p id="botDesc">무엇이든 물어보세요</p>
        </div>
        <div class="header-status">온라인</div>
    </div>

    <div class="messages" id="messages">
        <div class="welcome" id="welcome">
            <div class="welcome-icon">💬</div>
            <h3 id="welcomeTitle">안녕하세요!</h3>
            <p id="welcomeText">궁금한 점을 물어보세요.</p>
            <div id="nameSetArea" style="margin:12px auto;max-width:240px;">
                <div style="font-size:11px;color:#999;margin-bottom:5px;">이름 또는 업체명을 입력하면 상담원이 더 잘 도와드려요</div>
                <div style="display:flex;gap:5px;">
                    <input type="text" id="userNameInput" placeholder="이름 또는 업체명 (선택)" style="flex:1;padding:7px 12px;border:1px solid #ddd;border-radius:18px;font-size:12px;outline:none;">
                    <button onclick="setUserName()" style="background:var(--primary,#4a6cf7);color:#fff;border:none;padding:7px 12px;border-radius:18px;font-size:11px;cursor:pointer;">설정</button>
                </div>
            </div>
        </div>
    </div>

    <div class="input-area">
        <textarea id="input" rows="1" placeholder="메시지를 입력하세요..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
        <button id="sendBtn" onclick="sendMessage()">➤</button>
    </div>

    <script>
    marked.setOptions({ breaks: true, gfm: true });

    var params = new URLSearchParams(location.search);
    var tenant = params.get('tenant') || 'default';
    var sessionId = (typeof crypto.randomUUID === 'function') ? crypto.randomUUID() : 'xxxx-xxxx-xxxx'.replace(/x/g, function() { return (Math.random() * 16 | 0).toString(16); }) + '-' + Date.now().toString(36);
    var baseUrl = location.origin;
    var ws = null;
    var isWaiting = false;

    // 브랜딩 로드
    (async function loadBranding() {
        try {
            const r = await fetch(baseUrl + '/api/embed/config?tenant=' + encodeURIComponent(tenant));
            if (r.ok) {
                const d = await r.json();
                if (d.name) document.getElementById('botName').textContent = d.name;
                if (d.welcome_message) {
                    document.getElementById('welcomeTitle').textContent = d.welcome_message;
                }
                if (d.primary_color) {
                    document.documentElement.style.setProperty('--primary', d.primary_color);
                }
            }
        } catch(e) {}
    })();

    function connectWs() {
        ws = new WebSocket('ws://' + location.host + '/ws/chat/' + sessionId + '?tenant=' + encodeURIComponent(tenant));
        ws.onmessage = function(e) {
            const data = JSON.parse(e.data);
            if (data.type === 'message') {
                removeTyping();
                addMessage(data.role, data.message, data.sources);
                if (data.role === 'assistant') {
                    isWaiting = false;
                    document.getElementById('sendBtn').disabled = false;
                }
            }
        };
        ws.onclose = function() {
            setTimeout(connectWs, 3000);
        };
    }
    connectWs();

    function setUserName() {
        var name = document.getElementById('userNameInput').value.trim();
        if (!name) return;
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({type: 'set_name', name: name}));
        }
        document.getElementById('nameSetArea').innerHTML = '<div style="text-align:center;font-size:12px;color:var(--primary,#4a6cf7);font-weight:500;">👋 ' + name + '님, 환영합니다!</div>';
    }

    function sendMessage() {
        const input = document.getElementById('input');
        const text = input.value.trim();
        if (!text || isWaiting || !ws || ws.readyState !== WebSocket.OPEN) return;

        document.getElementById('welcome')?.remove();
        addMessage('user', text);
        showTyping();
        isWaiting = true;
        document.getElementById('sendBtn').disabled = true;
        input.value = '';
        input.style.height = 'auto';

        ws.send(JSON.stringify({ message: text }));
    }

    function addMessage(role, text, sources) {
        const msgDiv = document.createElement('div');
        const cls = role === 'user' ? 'user' : (role === 'admin' ? 'admin' : 'bot');
        msgDiv.className = 'msg ' + cls;

        const avatar = role === 'user' ? '👤' : (role === 'admin' ? '👨‍💼' : '🤖');

        let html = '<div class="msg-avatar">' + avatar + '</div>';
        html += '<div class="msg-content">';
        html += '<div class="msg-bubble">' + marked.parse(text || '') + '</div>';

        if (sources && sources.length > 0) {
            const srcId = 'src-' + Date.now();
            html += '<div class="sources-toggle" onclick="toggleSources(\'' + srcId + '\')">📎 참고 문서 (' + sources.length + '건)</div>';
            html += '<div class="sources-list" id="' + srcId + '">' + sources.map(s => '• ' + (s.title || s)).join('<br>') + '</div>';
        }

        const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
        html += '<div class="msg-time">' + time + '</div>';
        html += '</div>';

        msgDiv.innerHTML = html;
        document.getElementById('messages').appendChild(msgDiv);
        scrollBottom();
    }

    function toggleSources(id) {
        document.getElementById(id)?.classList.toggle('open');
    }

    function showTyping() {
        const div = document.createElement('div');
        div.className = 'msg bot';
        div.id = 'typing';
        div.innerHTML = '<div class="msg-avatar">🤖</div><div class="msg-content"><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>';
        document.getElementById('messages').appendChild(div);
        scrollBottom();
    }

    function removeTyping() {
        document.getElementById('typing')?.remove();
    }

    function scrollBottom() {
        const m = document.getElementById('messages');
        m.scrollTop = m.scrollHeight;
    }

    // textarea 자동 높이
    document.getElementById('input').addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 80) + 'px';
    });
    </script>
</body>
</html>
