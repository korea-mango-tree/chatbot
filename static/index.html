<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG 챗봇</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', 'Malgun Gothic', sans-serif; background: #f0f2f5; }

        .nav {
            background: #1a1a2e; padding: 16px 32px;
            display: flex; align-items: center; gap: 32px;
        }
        .nav h1 { color: #fff; font-size: 20px; }
        .nav a {
            color: #a0aec0; text-decoration: none; font-size: 15px;
            padding: 8px 16px; border-radius: 8px; transition: all 0.2s;
        }
        .nav a:hover, .nav a.active { color: #fff; background: #16213e; }

        .container { max-width: 900px; margin: 32px auto; padding: 0 16px; }

        /* ── Chat Page ── */
        .chat-wrapper {
            background: #fff; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            display: flex; flex-direction: column; height: 70vh;
        }
        .chat-header { padding: 20px 24px; border-bottom: 1px solid #eee; font-size: 18px; font-weight: 600; }
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 24px;
            display: flex; flex-direction: column; gap: 16px;
        }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 16px; line-height: 1.6; font-size: 14px; }
        .msg.assistant { max-width: 90%; }
        .msg.user { align-self: flex-end; background: #4a6cf7; color: #fff; border-bottom-right-radius: 4px; }
        .msg.assistant { align-self: flex-start; background: #f0f2f5; color: #333; border-bottom-left-radius: 4px; }
        .msg .sources { margin-top: 8px; font-size: 12px; color: #666; }
        .msg.assistant .sources { color: #888; }
        .msg.assistant table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 13px; }
        .msg.assistant th, .msg.assistant td { padding: 6px 10px; border: 1px solid #ddd; text-align: left; }
        .msg.assistant th { background: #e8eaf0; font-weight: 600; }
        .msg.assistant tr:nth-child(even) { background: #f8f9fa; }
        .msg.assistant ul, .msg.assistant ol { padding-left: 20px; margin: 8px 0; }
        .msg.assistant li { margin-bottom: 4px; }
        .msg.assistant p { margin: 6px 0; }
        .msg.assistant strong { color: #1a1a2e; }
        .msg.assistant h2, .msg.assistant h3 { font-size: 14px; margin: 10px 0 6px; }
        .msg.assistant code { background: #e8eaf0; padding: 1px 4px; border-radius: 3px; font-size: 12px; }

        .chat-input-area {
            padding: 16px 24px; border-top: 1px solid #eee;
            display: flex; gap: 12px;
        }
        .chat-input-area input {
            flex: 1; padding: 12px 16px; border: 1px solid #ddd; border-radius: 12px;
            font-size: 14px; outline: none; transition: border 0.2s;
        }
        .chat-input-area input:focus { border-color: #4a6cf7; }
        .chat-input-area button {
            padding: 12px 24px; background: #4a6cf7; color: #fff; border: none;
            border-radius: 12px; font-size: 14px; cursor: pointer; transition: background 0.2s;
        }
        .chat-input-area button:hover { background: #3b5de7; }
        .chat-input-area button:disabled { background: #ccc; cursor: not-allowed; }

        .typing-indicator { display: none; align-self: flex-start; padding: 12px 16px; background: #f0f2f5; border-radius: 16px; }
        .typing-indicator span {
            display: inline-block; width: 8px; height: 8px; background: #999;
            border-radius: 50%; margin: 0 2px; animation: bounce 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%,80%,100%{ transform: translateY(0); } 40%{ transform: translateY(-8px); } }

        /* ── Ingest Page ── */
        .ingest-wrapper {
            background: #fff; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 32px;
        }
        .ingest-wrapper h2 { font-size: 18px; margin-bottom: 24px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; color: #333; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 10px;
            font-size: 14px; outline: none; font-family: inherit; transition: border 0.2s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #4a6cf7; }
        .form-group textarea { min-height: 160px; resize: vertical; }
        .btn-submit {
            padding: 12px 32px; background: #4a6cf7; color: #fff; border: none;
            border-radius: 12px; font-size: 15px; cursor: pointer; transition: background 0.2s;
        }
        .btn-submit:hover { background: #3b5de7; }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; }
        .ingest-result {
            margin-top: 20px; padding: 16px; background: #f0fdf4; border: 1px solid #bbf7d0;
            border-radius: 10px; display: none; font-size: 14px; color: #166534;
        }
        .ingest-result.error { background: #fef2f2; border-color: #fecaca; color: #991b1b; }

        /* ── File Upload ── */
        .file-drop {
            border: 2px dashed #ccc; border-radius: 12px; padding: 48px 24px;
            text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 20px;
        }
        .file-drop:hover, .file-drop.dragover { border-color: #4a6cf7; background: #f0f4ff; }
        .file-drop p { font-size: 15px; color: #666; margin-bottom: 8px; }
        .file-drop .sub { font-size: 13px; color: #999; }
        .file-info {
            display: none; padding: 12px 16px; background: #f8f9fa; border-radius: 10px;
            margin-bottom: 20px; font-size: 14px; color: #333;
            align-items: center; justify-content: space-between;
        }
        .file-info .remove { color: #ef4444; cursor: pointer; font-weight: 600; }

        /* ── Health Page ── */
        .health-wrapper {
            background: #fff; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 32px; text-align: center;
        }
        .health-wrapper h2 { font-size: 18px; margin-bottom: 24px; }
        .health-status {
            display: inline-flex; align-items: center; gap: 12px;
            padding: 16px 32px; border-radius: 12px; font-size: 18px; font-weight: 600;
        }
        .health-status.ok { background: #f0fdf4; color: #166534; }
        .health-status.error { background: #fef2f2; color: #991b1b; }
        .health-dot {
            width: 14px; height: 14px; border-radius: 50%;
        }
        .health-status.ok .health-dot { background: #22c55e; }
        .health-status.error .health-dot { background: #ef4444; }
        .health-detail { margin-top: 16px; font-size: 13px; color: #888; }

        /* ── Document Management ── */
        .doc-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .doc-table th, .doc-table td { padding: 10px 14px; border-bottom: 1px solid #eee; text-align: left; }
        .doc-table th { background: #f8f9fa; font-weight: 600; color: #555; }
        .doc-table td.actions { white-space: nowrap; }
        .doc-table .btn-sm {
            padding: 4px 12px; border: none; border-radius: 6px; font-size: 13px;
            cursor: pointer; margin-right: 4px; transition: background 0.2s;
        }
        .btn-view { background: #e0e7ff; color: #3730a3; }
        .btn-view:hover { background: #c7d2fe; }
        .btn-edit { background: #fef3c7; color: #92400e; }
        .btn-edit:hover { background: #fde68a; }
        .btn-del { background: #fee2e2; color: #991b1b; }
        .btn-del:hover { background: #fecaca; }
        .doc-content-preview { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .badge {
            display: inline-block; padding: 2px 8px; border-radius: 4px;
            font-size: 12px; font-weight: 600;
        }
        .badge-sql { background: #dbeafe; color: #1e40af; }
        .badge-faq { background: #d1fae5; color: #065f46; }
        .badge-policy { background: #fef3c7; color: #92400e; }
        .badge-product { background: #ede9fe; color: #5b21b6; }
        .badge-info { background: #f3f4f6; color: #374151; }

        /* Modal */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #fff; border-radius: 16px; width: 90%; max-width: 700px;
            max-height: 80vh; overflow-y: auto; padding: 32px; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .modal h3 { font-size: 18px; margin-bottom: 20px; }
        .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
        .modal-actions button {
            padding: 10px 24px; border: none; border-radius: 10px; font-size: 14px; cursor: pointer;
        }
        .btn-cancel { background: #f3f4f6; color: #333; }
        .btn-save { background: #4a6cf7; color: #fff; }
        .btn-save:hover { background: #3b5de7; }

        /* ── Group ── */
        .group-card {
            border: 1px solid #e5e7eb; border-radius: 12px; padding: 20px; margin-bottom: 16px;
        }
        .group-card h4 { font-size: 16px; margin-bottom: 8px; }
        .group-card .desc { font-size: 13px; color: #888; margin-bottom: 12px; }
        .group-docs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
        .group-doc-tag {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 4px 10px; background: #f0f2f5; border-radius: 6px; font-size: 13px;
        }
        .group-doc-tag .remove-tag { cursor: pointer; color: #999; font-weight: bold; }
        .group-doc-tag .remove-tag:hover { color: #ef4444; }
        .group-actions { display: flex; gap: 8px; }

        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>

<nav class="nav">
    <h1>RAG 챗봇</h1>
    <a href="#chat" class="active" onclick="showPage('chat')">채팅</a>
    <a href="#ingest" onclick="showPage('ingest')">문서 업로드</a>
    <a href="#file" onclick="showPage('file')">파일 업로드</a>
    <a href="#docs" onclick="showPage('docs')">문서 관리</a>
    <a href="#groups" onclick="showPage('groups')">그룹 관리</a>
    <a href="#health" onclick="showPage('health')">상태 확인</a>
</nav>

<!-- ── Chat ── -->
<div class="container page active" id="page-chat">
    <div class="chat-wrapper">
        <div class="chat-header">AI 챗봇에게 질문하세요</div>
        <div class="chat-messages" id="chat-messages">
            <div class="msg assistant">안녕하세요! 문서 기반으로 답변해 드리는 AI 챗봇입니다. 궁금한 점을 물어보세요.</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="메시지를 입력하세요..." onkeydown="if(event.key==='Enter') sendChat()">
            <button id="chat-btn" onclick="sendChat()">전송</button>
        </div>
    </div>
</div>

<!-- ── Ingest ── -->
<div class="container page" id="page-ingest">
    <div class="ingest-wrapper">
        <h2>문서 업로드</h2>
        <div class="form-group">
            <label>제목</label>
            <input type="text" id="ingest-title" placeholder="예: 배송 정책">
        </div>
        <div class="form-group">
            <label>문서 유형</label>
            <select id="ingest-type">
                <option value="faq">FAQ</option>
                <option value="policy">정책</option>
                <option value="product">상품</option>
                <option value="info">일반 정보</option>
            </select>
        </div>
        <div class="form-group">
            <label>내용</label>
            <textarea id="ingest-content" placeholder="문서 내용을 입력하세요..."></textarea>
        </div>
        <button class="btn-submit" id="ingest-btn" onclick="submitIngest()">업로드</button>
        <div class="ingest-result" id="ingest-result"></div>
    </div>
</div>

<!-- ── File Upload ── -->
<div class="container page" id="page-file">
    <div class="ingest-wrapper">
        <h2>파일 업로드</h2>
        <div class="file-drop" id="file-drop" onclick="document.getElementById('file-input').click()"
             ondragover="event.preventDefault(); this.classList.add('dragover')"
             ondragleave="this.classList.remove('dragover')"
             ondrop="event.preventDefault(); this.classList.remove('dragover'); handleFileDrop(event)">
            <p>클릭하거나 파일을 드래그하세요 (여러 파일 가능)</p>
            <div class="sub">.sql, .txt, .csv, .json, .md 지원</div>
        </div>
        <input type="file" id="file-input" accept=".sql,.txt,.csv,.json,.md" multiple style="display:none" onchange="handleFileSelect(event)">
        <div id="file-list" style="margin-bottom:20px"></div>
        <div class="form-group">
            <label>문서 유형</label>
            <select id="file-type">
                <option value="sql">SQL</option>
                <option value="faq">FAQ</option>
                <option value="policy">정책</option>
                <option value="product">상품</option>
                <option value="info">일반 정보</option>
            </select>
        </div>
        <button class="btn-submit" id="file-btn" onclick="submitFile()">업로드</button>
        <div class="ingest-result" id="file-result"></div>
    </div>
</div>

<!-- ── Document Management ── -->
<div class="container page" id="page-docs">
    <div class="ingest-wrapper">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
            <h2>문서 관리</h2>
            <div style="display:flex; gap:8px">
                <button class="btn-sm btn-del" id="batch-del-btn" style="display:none; padding:8px 16px" onclick="batchDelete()">선택 삭제</button>
                <button class="btn-sm btn-del" style="padding:8px 16px" onclick="deleteAllDocuments()">전체 삭제</button>
                <button class="btn-submit" onclick="loadDocuments()" style="padding:8px 20px; font-size:13px">새로고침</button>
            </div>
        </div>
        <div id="doc-table-area">
            <p style="color:#888; text-align:center; padding:40px">로딩 중...</p>
        </div>
    </div>
</div>

<!-- ── View/Edit Modal ── -->
<div class="modal-overlay" id="modal-overlay">
    <div class="modal">
        <h3 id="modal-title">문서 상세</h3>
        <div class="form-group">
            <label>제목</label>
            <input type="text" id="modal-doc-title">
        </div>
        <div class="form-group">
            <label>문서 유형</label>
            <select id="modal-doc-type">
                <option value="faq">FAQ</option>
                <option value="policy">정책</option>
                <option value="product">상품</option>
                <option value="info">일반 정보</option>
                <option value="sql">SQL</option>
            </select>
        </div>
        <div class="form-group">
            <label>내용</label>
            <textarea id="modal-doc-content" style="min-height:250px"></textarea>
        </div>
        <div id="modal-meta" style="font-size:12px; color:#888; margin-top:8px"></div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">닫기</button>
            <button class="btn-save" id="modal-save-btn" onclick="saveDocument()">저장</button>
        </div>
    </div>
</div>

<!-- ── Delete Confirm Modal ── -->
<div class="modal-overlay" id="delete-modal">
    <div class="modal" style="max-width:400px; text-align:center">
        <h3>문서 삭제</h3>
        <p style="margin:16px 0; color:#666" id="delete-msg">이 문서를 삭제하시겠습니까?</p>
        <div class="modal-actions" style="justify-content:center">
            <button class="btn-cancel" onclick="closeDeleteModal()">취소</button>
            <button class="btn-del btn-sm" style="padding:10px 24px; font-size:14px" onclick="confirmDelete()">삭제</button>
        </div>
    </div>
</div>

<!-- ── Group Management ── -->
<div class="container page" id="page-groups">
    <div class="ingest-wrapper">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
            <h2>그룹 관리</h2>
            <div style="display:flex; gap:8px">
                <button class="btn-submit" onclick="openCreateGroup()" style="padding:8px 20px; font-size:13px">새 그룹</button>
                <button class="btn-submit" onclick="loadGroups()" style="padding:8px 20px; font-size:13px">새로고침</button>
            </div>
        </div>
        <div id="group-list-area">
            <p style="color:#888; text-align:center; padding:40px">로딩 중...</p>
        </div>
    </div>
</div>

<!-- ── Group Create/Edit Modal ── -->
<div class="modal-overlay" id="group-modal">
    <div class="modal">
        <h3 id="group-modal-title">새 그룹 만들기</h3>
        <div class="form-group">
            <label>그룹 이름</label>
            <input type="text" id="group-name" placeholder="예: 구독 플랜 관련">
        </div>
        <div class="form-group">
            <label>설명 (선택)</label>
            <input type="text" id="group-desc" placeholder="이 그룹에 대한 설명">
        </div>
        <div class="form-group">
            <label>문서 선택</label>
            <div id="group-doc-checkboxes" style="max-height:200px; overflow-y:auto; border:1px solid #eee; border-radius:8px; padding:12px"></div>
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeGroupModal()">취소</button>
            <button class="btn-save" id="group-save-btn" onclick="saveGroup()">저장</button>
        </div>
    </div>
</div>

<!-- ── Health ── -->
<div class="container page" id="page-health">
    <div class="health-wrapper">
        <h2>서버 상태</h2>
        <div id="health-status"></div>
        <div class="health-detail" id="health-detail"></div>
        <div style="margin-top:24px">
            <button class="btn-submit" id="restart-btn" onclick="restartServer()" style="background:#ef4444">서버 재시작</button>
        </div>
        <div class="ingest-result" id="restart-result" style="display:none; margin-top:16px"></div>
    </div>
</div>

<script>
    const SESSION_ID = 'session-' + Math.random().toString(36).substring(2, 10);

    function showPage(name) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + name).classList.add('active');
        document.querySelectorAll('.nav a').forEach(a => a.classList.remove('active'));
        document.querySelector(`.nav a[href="#${name}"]`).classList.add('active');

        if (name === 'docs') loadDocuments();
        if (name === 'groups') loadGroups();
        if (name === 'health') checkHealth();
    }

    // ── Chat ──
    async function sendChat() {
        const input = document.getElementById('chat-input');
        const btn = document.getElementById('chat-btn');
        const msg = input.value.trim();
        if (!msg) return;

        appendMsg('user', msg);
        input.value = '';
        btn.disabled = true;

        // typing indicator
        const typing = document.createElement('div');
        typing.className = 'typing-indicator';
        typing.style.display = 'block';
        typing.innerHTML = '<span></span><span></span><span></span>';
        document.getElementById('chat-messages').appendChild(typing);
        scrollChat();

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: SESSION_ID, message: msg })
            });
            const data = await res.json();
            typing.remove();

            let text = data.answer;
            if (data.sources && data.sources.length > 0) {
                text += '\n\n> 참고: ' + data.sources.map(s => s.title).join(', ');
            }
            appendMsg('assistant', text);
        } catch (e) {
            typing.remove();
            appendMsg('assistant', '오류가 발생했습니다. 서버 상태를 확인해주세요.');
        }
        btn.disabled = false;
        input.focus();
    }

    function appendMsg(role, text) {
        const div = document.createElement('div');
        div.className = 'msg ' + role;
        if (role === 'assistant') {
            div.innerHTML = marked.parse(text);
        } else {
            div.textContent = text;
        }
        document.getElementById('chat-messages').appendChild(div);
        scrollChat();
    }

    function scrollChat() {
        const el = document.getElementById('chat-messages');
        el.scrollTop = el.scrollHeight;
    }

    // ── Ingest ──
    async function submitIngest() {
        const title = document.getElementById('ingest-title').value.trim();
        const content = document.getElementById('ingest-content').value.trim();
        const sourceType = document.getElementById('ingest-type').value;
        const resultEl = document.getElementById('ingest-result');
        const btn = document.getElementById('ingest-btn');

        if (!title || !content) {
            resultEl.className = 'ingest-result error';
            resultEl.style.display = 'block';
            resultEl.textContent = '제목과 내용을 모두 입력해주세요.';
            return;
        }

        btn.disabled = true;
        btn.textContent = '업로드 중...';

        try {
            const res = await fetch('/ingest/text', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, content, source_type: sourceType })
            });
            const data = await res.json();

            if (res.ok) {
                resultEl.className = 'ingest-result';
                resultEl.style.display = 'block';
                resultEl.textContent = `✅ 업로드 완료! 문서 ID: ${data.document_id}, 청크 수: ${data.chunk_count}`;
                document.getElementById('ingest-title').value = '';
                document.getElementById('ingest-content').value = '';
            } else {
                resultEl.className = 'ingest-result error';
                resultEl.style.display = 'block';
                resultEl.textContent = '❌ 업로드 실패: ' + JSON.stringify(data);
            }
        } catch (e) {
            resultEl.className = 'ingest-result error';
            resultEl.style.display = 'block';
            resultEl.textContent = '❌ 서버 연결 실패';
        }
        btn.disabled = false;
        btn.textContent = '업로드';
    }

    // ── File Upload ──
    let selectedFiles = [];

    function handleFileSelect(e) {
        addFiles(e.target.files);
    }

    function handleFileDrop(e) {
        addFiles(e.dataTransfer.files);
    }

    function addFiles(fileList) {
        for (const f of fileList) {
            if (!selectedFiles.some(s => s.name === f.name && s.size === f.size)) {
                selectedFiles.push(f);
            }
        }
        renderFileList();
    }

    function removeFile(idx) {
        selectedFiles.splice(idx, 1);
        document.getElementById('file-input').value = '';
        renderFileList();
    }

    function clearFiles() {
        selectedFiles = [];
        document.getElementById('file-input').value = '';
        renderFileList();
    }

    function renderFileList() {
        const listEl = document.getElementById('file-list');
        if (selectedFiles.length === 0) {
            listEl.innerHTML = '';
            document.getElementById('file-drop').style.display = 'block';
            return;
        }
        document.getElementById('file-drop').style.display = 'block';
        listEl.innerHTML = selectedFiles.map((f, i) =>
            `<div class="file-info" style="display:flex; margin-bottom:8px">
                <span>${f.name} (${(f.size / 1024).toFixed(1)} KB)</span>
                <span class="remove" onclick="removeFile(${i})">삭제</span>
            </div>`
        ).join('') + `<div style="text-align:right;margin-top:4px">
            <span style="font-size:13px;color:#666">${selectedFiles.length}개 파일 선택됨</span>
            <span class="remove" style="margin-left:12px;font-size:13px" onclick="clearFiles()">전체 삭제</span>
        </div>`;
    }

    async function submitFile() {
        const resultEl = document.getElementById('file-result');
        const btn = document.getElementById('file-btn');

        if (selectedFiles.length === 0) {
            resultEl.className = 'ingest-result error';
            resultEl.style.display = 'block';
            resultEl.textContent = '파일을 선택해주세요.';
            return;
        }

        btn.disabled = true;
        btn.textContent = `업로드 중... (${selectedFiles.length}개)`;

        const formData = new FormData();
        selectedFiles.forEach(f => formData.append('files', f));
        formData.append('source_type', document.getElementById('file-type').value);

        try {
            const res = await fetch('/ingest/file', { method: 'POST', body: formData });
            const data = await res.json();

            if (res.ok) {
                const lines = data.results.map(r =>
                    r.success
                        ? `${r.title} (ID: ${r.document_id}, 청크: ${r.chunk_count})`
                        : `${r.title} - 실패`
                );
                resultEl.className = 'ingest-result';
                resultEl.style.display = 'block';
                resultEl.innerHTML = `업로드 완료! ${data.success_count}/${data.total}건 성공<br>` + lines.join('<br>');
                clearFiles();
            } else {
                resultEl.className = 'ingest-result error';
                resultEl.style.display = 'block';
                resultEl.textContent = '업로드 실패: ' + JSON.stringify(data);
            }
        } catch (e) {
            resultEl.className = 'ingest-result error';
            resultEl.style.display = 'block';
            resultEl.textContent = '서버 연결 실패';
        }
        btn.disabled = false;
        btn.textContent = '업로드';
    }

    // ── Document Management ──
    const badgeClass = { sql:'badge-sql', faq:'badge-faq', policy:'badge-policy', product:'badge-product', info:'badge-info' };

    let currentDocId = null;
    let deleteDocId = null;

    function updateBatchBtn() {
        const checked = document.querySelectorAll('.doc-check:checked');
        const btn = document.getElementById('batch-del-btn');
        btn.style.display = checked.length > 0 ? 'inline-block' : 'none';
        btn.textContent = `선택 삭제 (${checked.length})`;
    }

    function toggleAllDocs(el) {
        document.querySelectorAll('.doc-check').forEach(cb => cb.checked = el.checked);
        updateBatchBtn();
    }

    async function loadDocuments() {
        const area = document.getElementById('doc-table-area');
        document.getElementById('batch-del-btn').style.display = 'none';
        try {
            const res = await fetch('/documents');
            const data = await res.json();

            if (data.documents.length === 0) {
                area.innerHTML = '<p style="color:#888; text-align:center; padding:40px">등록된 문서가 없습니다.</p>';
                return;
            }

            let html = `<table class="doc-table">
                <thead><tr>
                    <th><input type="checkbox" onchange="toggleAllDocs(this)"></th>
                    <th>ID</th><th>제목</th><th>유형</th><th>청크</th><th>등록일</th><th>관리</th>
                </tr></thead><tbody>`;

            data.documents.forEach(doc => {
                const cls = badgeClass[doc.source_type] || 'badge-info';
                const date = new Date(doc.created_at).toLocaleDateString('ko-KR');
                html += `<tr>
                    <td><input type="checkbox" class="doc-check" value="${doc.id}" onchange="updateBatchBtn()"></td>
                    <td>${doc.id}</td>
                    <td class="doc-content-preview">${doc.title}</td>
                    <td><span class="badge ${cls}">${doc.source_type}</span></td>
                    <td>${doc.chunk_count}</td>
                    <td>${date}</td>
                    <td class="actions">
                        <button class="btn-sm btn-view" onclick="viewDocument(${doc.id})">보기</button>
                        <button class="btn-sm btn-edit" onclick="editDocument(${doc.id})">수정</button>
                        <button class="btn-sm btn-del" onclick="deleteDocument(${doc.id}, '${doc.title.replace(/'/g, "\\'")}')">삭제</button>
                    </td>
                </tr>`;
            });

            html += '</tbody></table>';
            area.innerHTML = html;
        } catch (e) {
            area.innerHTML = '<p style="color:#991b1b; text-align:center; padding:40px">문서 목록을 불러오지 못했습니다.</p>';
        }
    }

    async function viewDocument(id) {
        const res = await fetch(`/documents/${id}`);
        const doc = await res.json();
        currentDocId = id;

        document.getElementById('modal-title').textContent = '문서 상세';
        document.getElementById('modal-doc-title').value = doc.title;
        document.getElementById('modal-doc-type').value = doc.source_type;
        document.getElementById('modal-doc-content').value = doc.content;
        document.getElementById('modal-doc-title').readOnly = true;
        document.getElementById('modal-doc-type').disabled = true;
        document.getElementById('modal-doc-content').readOnly = true;
        document.getElementById('modal-save-btn').style.display = 'none';
        document.getElementById('modal-meta').textContent = `청크 수: ${doc.chunk_count} | 등록일: ${new Date(doc.created_at).toLocaleString('ko-KR')}`;
        document.getElementById('modal-overlay').classList.add('active');
    }

    async function editDocument(id) {
        const res = await fetch(`/documents/${id}`);
        const doc = await res.json();
        currentDocId = id;

        document.getElementById('modal-title').textContent = '문서 수정';
        document.getElementById('modal-doc-title').value = doc.title;
        document.getElementById('modal-doc-type').value = doc.source_type;
        document.getElementById('modal-doc-content').value = doc.content;
        document.getElementById('modal-doc-title').readOnly = false;
        document.getElementById('modal-doc-type').disabled = false;
        document.getElementById('modal-doc-content').readOnly = false;
        document.getElementById('modal-save-btn').style.display = 'inline-block';
        document.getElementById('modal-meta').textContent = '';
        document.getElementById('modal-overlay').classList.add('active');
    }

    function closeModal() {
        document.getElementById('modal-overlay').classList.remove('active');
        currentDocId = null;
    }

    async function saveDocument() {
        if (!currentDocId) return;
        const btn = document.getElementById('modal-save-btn');
        btn.disabled = true;
        btn.textContent = '저장 중...';

        try {
            const res = await fetch(`/documents/${currentDocId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    title: document.getElementById('modal-doc-title').value,
                    source_type: document.getElementById('modal-doc-type').value,
                    content: document.getElementById('modal-doc-content').value,
                })
            });

            if (res.ok) {
                closeModal();
                loadDocuments();
            } else {
                alert('저장 실패');
            }
        } catch (e) {
            alert('서버 연결 실패');
        }
        btn.disabled = false;
        btn.textContent = '저장';
    }

    function deleteDocument(id, title) {
        deleteDocId = id;
        document.getElementById('delete-msg').textContent = `"${title}" 문서를 삭제하시겠습니까?`;
        document.getElementById('delete-modal').classList.add('active');
    }

    function closeDeleteModal() {
        document.getElementById('delete-modal').classList.remove('active');
        deleteDocId = null;
    }

    async function confirmDelete() {
        try {
            let ok = false;
            if (deleteAction) {
                ok = await deleteAction();
                deleteAction = null;
            } else if (deleteDocId) {
                const res = await fetch(`/documents/${deleteDocId}`, { method: 'DELETE' });
                ok = res.ok;
            }
            if (ok) {
                closeDeleteModal();
                loadDocuments();
                if (document.getElementById('page-groups').classList.contains('active')) loadGroups();
            } else {
                alert('삭제 실패');
            }
        } catch (e) {
            alert('서버 연결 실패');
        }
        deleteDocId = null;
    }

    async function batchDelete() {
        const ids = [...document.querySelectorAll('.doc-check:checked')].map(cb => Number(cb.value));
        if (ids.length === 0) return;

        deleteAction = async () => {
            const res = await fetch('/documents/batch-delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ document_ids: ids })
            });
            return res.ok;
        };
        document.getElementById('delete-msg').textContent = `선택한 ${ids.length}개 문서를 삭제하시겠습니까?`;
        document.getElementById('delete-modal').classList.add('active');
    }

    async function deleteAllDocuments() {
        deleteAction = async () => {
            const res = await fetch('/documents/all', { method: 'DELETE' });
            return res.ok;
        };
        document.getElementById('delete-msg').textContent = '모든 문서를 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.';
        document.getElementById('delete-modal').classList.add('active');
    }

    let deleteAction = null;

    // ── Group Management ──
    let editingGroupId = null;
    let allDocsCache = [];

    async function loadGroups() {
        const area = document.getElementById('group-list-area');
        try {
            const res = await fetch('/groups');
            const data = await res.json();

            if (data.groups.length === 0) {
                area.innerHTML = '<p style="color:#888; text-align:center; padding:40px">등록된 그룹이 없습니다. "새 그룹" 버튼으로 관련 문서들을 묶어보세요.</p>';
                return;
            }

            area.innerHTML = data.groups.map(g => `
                <div class="group-card">
                    <div style="display:flex; justify-content:space-between; align-items:start">
                        <div>
                            <h4>${g.name}</h4>
                            ${g.description ? `<div class="desc">${g.description}</div>` : ''}
                        </div>
                        <div class="group-actions">
                            <button class="btn-sm btn-edit" onclick="editGroup(${g.id})">수정</button>
                            <button class="btn-sm btn-del" onclick="deleteGroup(${g.id}, '${g.name.replace(/'/g, "\\'")}')">삭제</button>
                        </div>
                    </div>
                    <div class="group-docs">
                        ${g.documents.length > 0
                            ? g.documents.map(d => `<span class="group-doc-tag">${d.title} <span class="badge ${badgeClass[d.source_type]||'badge-info'}">${d.source_type}</span></span>`).join('')
                            : '<span style="color:#999; font-size:13px">문서 없음</span>'}
                    </div>
                    <div style="font-size:12px; color:#aaa">${g.documents.length}개 문서 | 생성: ${new Date(g.created_at).toLocaleDateString('ko-KR')}</div>
                </div>
            `).join('');
        } catch (e) {
            area.innerHTML = '<p style="color:#991b1b; text-align:center; padding:40px">그룹 목록을 불러오지 못했습니다.</p>';
        }
    }

    async function loadDocsForGroupModal(selectedIds = []) {
        try {
            const res = await fetch('/documents');
            const data = await res.json();
            allDocsCache = data.documents;

            const container = document.getElementById('group-doc-checkboxes');
            if (data.documents.length === 0) {
                container.innerHTML = '<p style="color:#888">등록된 문서가 없습니다.</p>';
                return;
            }
            container.innerHTML = data.documents.map(d => `
                <label style="display:flex; align-items:center; gap:8px; padding:6px 0; cursor:pointer">
                    <input type="checkbox" class="group-doc-cb" value="${d.id}" ${selectedIds.includes(d.id) ? 'checked' : ''}>
                    <span>${d.title}</span>
                    <span class="badge ${badgeClass[d.source_type]||'badge-info'}" style="margin-left:auto">${d.source_type}</span>
                </label>
            `).join('');
        } catch (e) {
            document.getElementById('group-doc-checkboxes').innerHTML = '<p style="color:#991b1b">문서 불러오기 실패</p>';
        }
    }

    async function openCreateGroup() {
        editingGroupId = null;
        document.getElementById('group-modal-title').textContent = '새 그룹 만들기';
        document.getElementById('group-name').value = '';
        document.getElementById('group-desc').value = '';
        await loadDocsForGroupModal();
        document.getElementById('group-modal').classList.add('active');
    }

    async function editGroup(id) {
        editingGroupId = id;
        const res = await fetch(`/groups`);
        const data = await res.json();
        const group = data.groups.find(g => g.id === id);
        if (!group) return;

        document.getElementById('group-modal-title').textContent = '그룹 수정';
        document.getElementById('group-name').value = group.name;
        document.getElementById('group-desc').value = group.description || '';
        await loadDocsForGroupModal(group.documents.map(d => d.id));
        document.getElementById('group-modal').classList.add('active');
    }

    function closeGroupModal() {
        document.getElementById('group-modal').classList.remove('active');
        editingGroupId = null;
    }

    async function saveGroup() {
        const name = document.getElementById('group-name').value.trim();
        if (!name) { alert('그룹 이름을 입력하세요.'); return; }

        const docIds = [...document.querySelectorAll('.group-doc-cb:checked')].map(cb => Number(cb.value));
        const desc = document.getElementById('group-desc').value.trim() || null;
        const btn = document.getElementById('group-save-btn');
        btn.disabled = true;
        btn.textContent = '저장 중...';

        try {
            if (editingGroupId) {
                // 그룹 정보 수정
                await fetch(`/groups/${editingGroupId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, description: desc })
                });
                // 기존 문서 전부 제거 후 새로 추가
                const currentRes = await fetch('/groups');
                const currentData = await currentRes.json();
                const current = currentData.groups.find(g => g.id === editingGroupId);
                if (current && current.documents.length > 0) {
                    await fetch(`/groups/${editingGroupId}/documents`, {
                        method: 'DELETE',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ document_ids: current.documents.map(d => d.id) })
                    });
                }
                if (docIds.length > 0) {
                    await fetch(`/groups/${editingGroupId}/documents`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ document_ids: docIds })
                    });
                }
            } else {
                await fetch('/groups', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, description: desc, document_ids: docIds })
                });
            }
            closeGroupModal();
            loadGroups();
        } catch (e) {
            alert('저장 실패');
        }
        btn.disabled = false;
        btn.textContent = '저장';
    }

    function deleteGroup(id, name) {
        deleteAction = async () => {
            const res = await fetch(`/groups/${id}`, { method: 'DELETE' });
            return res.ok;
        };
        document.getElementById('delete-msg').textContent = `"${name}" 그룹을 삭제하시겠습니까?`;
        document.getElementById('delete-modal').classList.add('active');
    }

    // ── Health ──
    async function checkHealth() {
        const statusEl = document.getElementById('health-status');
        const detailEl = document.getElementById('health-detail');

        try {
            const start = Date.now();
            const res = await fetch('/health');
            const elapsed = Date.now() - start;
            const data = await res.json();

            if (data.status === 'ok') {
                statusEl.innerHTML = '<div class="health-status ok"><span class="health-dot"></span> 정상 작동 중</div>';
            } else {
                statusEl.innerHTML = '<div class="health-status error"><span class="health-dot"></span> 오류</div>';
            }
            detailEl.textContent = `응답 시간: ${elapsed}ms | 확인 시각: ${new Date().toLocaleTimeString()}`;
        } catch (e) {
            statusEl.innerHTML = '<div class="health-status error"><span class="health-dot"></span> 서버 연결 불가</div>';
            detailEl.textContent = `확인 시각: ${new Date().toLocaleTimeString()}`;
        }
    }

    async function restartServer() {
        const btn = document.getElementById('restart-btn');
        const resultEl = document.getElementById('restart-result');

        btn.disabled = true;
        btn.textContent = '재시작 중...';
        resultEl.style.display = 'none';

        try {
            await fetch('/restart', { method: 'POST' });
            resultEl.className = 'ingest-result';
            resultEl.style.display = 'block';
            resultEl.textContent = '서버 재시작 요청 완료. 잠시 후 자동으로 상태를 확인합니다...';

            // 3초 후 health check로 복구 확인
            setTimeout(async () => {
                for (let i = 0; i < 10; i++) {
                    try {
                        const res = await fetch('/health');
                        if (res.ok) {
                            resultEl.textContent = '서버가 정상적으로 재시작되었습니다.';
                            checkHealth();
                            break;
                        }
                    } catch (e) { /* 아직 재시작 중 */ }
                    await new Promise(r => setTimeout(r, 1000));
                }
                btn.disabled = false;
                btn.textContent = '서버 재시작';
            }, 3000);
        } catch (e) {
            resultEl.className = 'ingest-result error';
            resultEl.style.display = 'block';
            resultEl.textContent = '재시작 요청 실패';
            btn.disabled = false;
            btn.textContent = '서버 재시작';
        }
    }
</script>

</body>
</html>
